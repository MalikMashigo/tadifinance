<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/tadilogo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TadiAgent</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        background: #1a1a18;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 50%;
        animation: heartbeat 1.2s ease-in-out infinite;
      }
      @keyframes heartbeat {
        0%   { transform: scale(1);    }
        14%  { transform: scale(1.18); }
        28%  { transform: scale(1);    }
        42%  { transform: scale(1.12); }
        58%  { transform: scale(1);    }
        100% { transform: scale(1);    }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <img src="/tadilogo.jpeg" alt="Loading…" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
